        <div class="scr-range">
          <input type="number" id="scr-ch-min" placeholder="Min" step="0.1">
          <span>–</span>
          <input type="number" id="scr-ch-max" placeholder="Max" step="0.1">
        </div>
      </div>
      <div class="scr-field">
        <label>Beta</label>
        <div class="scr-range">
          <input type="number" id="scr-bt-min" placeholder="Min" step="0.1">
          <span>–</span>
          <input type="number" id="scr-bt-max" placeholder="Max" step="0.1">
        </div>
      </div>
      <div class="scr-field">
        <label>Price / Book</label>
        <div class="scr-range">
          <input type="number" id="scr-pb-min" placeholder="Min" step="0.1">
          <span>–</span>
          <input type="number" id="scr-pb-max" placeholder="Max" step="0.1">
        </div>
      </div>
      <div class="scr-field">
        <label>Debt / Equity</label>
        <div class="scr-range">
          <input type="number" id="scr-de-min" placeholder="Min" step="1">
          <span>–</span>
          <input type="number" id="scr-de-max" placeholder="Max" step="1">
        </div>
      </div>
      <div class="scr-field">
        <label>Revenue Growth (%)</label>
        <div class="scr-range">
          <input type="number" id="scr-rg-min" placeholder="Min" step="1">
          <span>–</span>
          <input type="number" id="scr-rg-max" placeholder="Max" step="1">
        </div>
      </div>
      <div class="scr-field">
        <label>Profit Margin (%)</label>
        <div class="scr-range">
          <input type="number" id="scr-pm-min" placeholder="Min" step="1">
          <span>–</span>
          <input type="number" id="scr-pm-max" placeholder="Max" step="1">
        </div>
      </div>
      <div class="scr-field">
        <label>% From 52w High</label>
        <div class="scr-range">
          <input type="number" id="scr-hh-min" placeholder="Min" step="1">
          <span>–</span>
          <input type="number" id="scr-hh-max" placeholder="Max" step="1">
        </div>
      </div>
      <div class="scr-field">
        <label>% From 52w Low</label>
        <div class="scr-range">
          <input type="number" id="scr-hl-min" placeholder="Min" step="1">
          <span>–</span>
          <input type="number" id="scr-hl-max" placeholder="Max" step="1">
        </div>
      </div>
      <div class="scr-field">
        <label>Vol / Avg Vol (min)</label>
        <div class="scr-range">
          <input type="number" id="scr-vol-min" placeholder="e.g. 1.5" step="0.1" style="width:100%">
        </div>
      </div>
      <div class="scr-field scr-full">
        <label>Sector</label>
        <select id="scr-sector">
          <option value="">All Sectors</option>
          ${sectorOptions}
        </select>
      </div>
    </div>
    <div class="scr-actions">
      <button class="btn-primary" onclick="runScreen()">▶ Run Screen</button>
      <button class="btn-ghost" onclick="clearScreen()">✕ Clear</button>
      <span id="screener-status">${universeLine}</span>
    </div>
  </div>

  <div>
    <div id="screener-results-header">
      <h3 id="screener-results-title">Results</h3>
      <span id="screener-results-info"></span>
    </div>
    <div id="screener-table-wrap">
      ${renderScreenerTable()}
    </div>
  </div>
</div>`;
}

function renderScreenerTable() {
  const results = S.screenerResults;
  if (!results || results.length === 0) {
    return `<div class="empty-state"><div class="emoji">🔍</div><p>Set filters above and click <strong>Run Screen</strong> to find stocks.</p></div>`;
  }
  const sorted = [...results].sort((a, b) => {
    const av = a[S.screenerSort] ?? (S.screenerSortDir > 0 ? Infinity : -Infinity);
    const bv = b[S.screenerSort] ?? (S.screenerSortDir > 0 ? Infinity : -Infinity);
    if (typeof av === 'string') return av.localeCompare(bv) * S.screenerSortDir;
    return (av - bv) * S.screenerSortDir;
  });

  function sortArrow(col) {
    if (S.screenerSort !== col) return '';
    return `<span class="sort-arrow">${S.screenerSortDir > 0 ? '▲' : '▼'}</span>`;
  }
  function th(label, col, align='right') {
    return `<th style="text-align:${align}" onclick="sortScreener('${col}')">${label}${sortArrow(col)}</th>`;
  }

  const rows = sorted.map(r => {
    const chCls = r.changePct >= 0 ? 'pos-green' : 'pos-red';
    const chSign = r.changePct >= 0 ? '+' : '';
    return `<tr onclick="screenerClickTicker('${r.ticker}')">
      <td><span class="scr-ticker">${esc(r.ticker)}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(r.name)}</td>
      <td><span class="scr-sector-tag">${esc(r.sector)}</span></td>
      <td>$${r.price.toFixed(2)}</td>
      <td class="${chCls}">${chSign}${r.changePct.toFixed(2)}%</td>
      <td>${r.marketCap ? fmtBig(r.marketCap) : '—'}</td>
      <td>${r.pe != null ? r.pe.toFixed(1) : '—'}</td>
      <td>${r.divYield != null ? (r.divYield*100).toFixed(2)+'%' : '—'}</td>
      <td>${r.beta != null ? r.beta.toFixed(2) : '—'}</td>
      <td>${r.high52w ? '$'+r.high52w.toFixed(2) : '—'}</td>
      <td>${r.low52w ? '$'+r.low52w.toFixed(2) : '—'}</td>
      <td>${r.pctFromHigh != null ? r.pctFromHigh.toFixed(1)+'%' : '—'}</td>
      <td>${r.volRatio != null ? r.volRatio.toFixed(2)+'x' : '—'}</td>
      <td>${r.revenueGrowth != null ? (r.revenueGrowth*100).toFixed(1)+'%' : '—'}</td>
      <td>${r.profitMargin != null ? (r.profitMargin*100).toFixed(1)+'%' : '—'}</td>
      <td>${r.priceToBook != null ? r.priceToBook.toFixed(2) : '—'}</td>
      <td>${r.debtToEquity != null ? r.debtToEquity.toFixed(1) : '—'}</td>
    </tr>`;
  }).join('');

  return `<table id="screener-table">
    <thead><tr>
      ${th('Ticker','ticker','left')}
      ${th('Name','name','left')}
      ${th('Sector','sector','left')}
      ${th('Price','price')}
      ${th('Chg%','changePct')}
      ${th('Mkt Cap','marketCap')}
      ${th('P/E','pe')}
      ${th('Div%','divYield')}
      ${th('Beta','beta')}
      ${th('52wHigh','high52w')}
      ${th('52wLow','low52w')}
      ${th('From High','pctFromHigh')}
      ${th('Vol/Avg','volRatio')}
      ${th('Rev Grw','revenueGrowth')}
      ${th('Margin','profitMargin')}
      ${th('P/B','priceToBook')}
      ${th('D/E','debtToEquity')}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function collectScreenFilters() {
  const gv = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const params = new URLSearchParams();
  const add = (key, id) => { const v = gv(id); if (v) params.set(key, v); };
  add('peMin','scr-pe-min'); add('peMax','scr-pe-max');
  add('mcMin','scr-mc-min'); add('mcMax','scr-mc-max');
  add('dyMin','scr-dy-min'); add('dyMax','scr-dy-max');
  add('chMin','scr-ch-min'); add('chMax','scr-ch-max');
  add('btMin','scr-bt-min'); add('btMax','scr-bt-max');
  add('pbMin','scr-pb-min'); add('pbMax','scr-pb-max');
  add('deMin','scr-de-min'); add('deMax','scr-de-max');
  add('rgMin','scr-rg-min'); add('rgMax','scr-rg-max');
  add('pmMin','scr-pm-min'); add('pmMax','scr-pm-max');
  add('hhMin','scr-hh-min'); add('hhMax','scr-hh-max');
  add('hlMin','scr-hl-min'); add('hlMax','scr-hl-max');
  add('volMin','scr-vol-min');
  add('sector','scr-sector');
  return params.toString();
}

async function runScreen(silent = false) {
  const statusEl = document.getElementById('screener-status');
  if (!silent) {
    const tw = document.getElementById('screener-table-wrap');
    if (tw) tw.innerHTML = '<div class="loading">Screening…</div>';
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--accent)">⏳ Running screen…</span>';
  }
  try {
    const qs = collectScreenFilters();
    const data = await api('GET', `/api/screen?${qs}`);
    S.screenerResults  = data.results  || [];
    S.screenerUniverseSize = data.universeSize || 0;
    S.screenerBuilding = data.building || false;
    S.screenerLoaded   = true;

    const tw = document.getElementById('screener-table-wrap');
    if (tw) tw.innerHTML = renderScreenerTable();

    const titleEl = document.getElementById('screener-results-title');
    if (titleEl) titleEl.textContent = `Results (${S.screenerResults.length})`;

    const infoEl = document.getElementById('screener-results-info');
    if (infoEl) infoEl.textContent = `Universe: ${S.screenerUniverseSize} tickers${S.screenerBuilding ? ' (building…)' : ''}`;

    if (statusEl) {
      statusEl.innerHTML = S.screenerBuilding
        ? '<span style="color:var(--accent)">Universe building in background…</span>'
        : `<span style="color:var(--text-muted)">Universe: ${S.screenerUniverseSize} tickers — refreshes in ${S.countdown}s</span>`;
    }
  } catch(e) {
    if (!silent) {
      const tw = document.getElementById('screener-table-wrap');
      if (tw) tw.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Error: ${esc(String(e))}</p></div>`;
    }
  }
}

function clearScreen() {
  ['scr-pe-min','scr-pe-max','scr-mc-min','scr-mc-max','scr-dy-min','scr-dy-max',
   'scr-ch-min','scr-ch-max','scr-bt-min','scr-bt-max','scr-pb-min','scr-pb-max',
   'scr-de-min','scr-de-max','scr-rg-min','scr-rg-max','scr-pm-min','scr-pm-max',
   'scr-hh-min','scr-hh-max','scr-hl-min','scr-hl-max','scr-vol-min'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const sec = document.getElementById('scr-sector');
  if (sec) sec.value = '';
  S.screenerResults = [];
  const tw = document.getElementById('screener-table-wrap');
  if (tw) tw.innerHTML = renderScreenerTable();
  const titleEl = document.getElementById('screener-results-title');
  if (titleEl) titleEl.textContent = 'Results';
}

function sortScreener(col) {
  if (S.screenerSort === col) {
    S.screenerSortDir *= -1;
  } else {
    S.screenerSort = col;
    S.screenerSortDir = -1; // default desc
  }
  const tw = document.getElementById('screener-table-wrap');
  if (tw) tw.innerHTML = renderScreenerTable();
}

async function screenerClickTicker(ticker) {
  // Switch to Financials tab and load that ticker
  S.selectedTicker = ticker;
  switchTab('financials');
}

// ============================================================
// UTILITIES
// ============================================================
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtBig(n) {
  if (!n) return '—';
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString();
}
function fmtVol(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return n.toString();
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Keyboard: Escape closes panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').classList.contains('visible')) hideModal();
    else if (document.getElementById('close-pos-modal').classList.contains('visible')) hideClosePosModal();
    else closePanel();
  }
});

// Boot
init();
</script>
