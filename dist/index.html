<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.2/dist/apexcharts.min.js"></script>
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #16161f;
  --border: #2a2a3a;
  --text-primary: #e8e6e3;
  --text-secondary: #9a9aaa;
  --text-muted: #6a6a7a;
  --accent: #d4a44a;
  --red: #c44040;
  --green: #40a060;
  --blue: #4a8ac4;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', sans-serif; font-size: 13px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
input, select, textarea {
  background: var(--bg-secondary); border: 1px solid var(--border);
  color: var(--text-primary); border-radius: 4px; padding: 5px 8px; font-size: 13px;
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
button {
  cursor: pointer; border: none; border-radius: 4px; padding: 6px 14px;
  font-size: 13px; font-weight: 500; transition: opacity 0.15s;
}
button:hover { opacity: 0.85; }
button.btn-primary { background: var(--accent); color: #0a0a0f; }
button.btn-danger { background: var(--red); color: #fff; }
button.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
button.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
button.btn-sm { padding: 3px 8px; font-size: 11px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }

/* HEADER */
#header {
  background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 16px;
  flex-shrink: 0; height: 44px;
}
#header h1 { font-size: 15px; font-weight: 700; color: var(--accent); margin-right: auto; }
#refresh-timer { color: var(--text-muted); font-size: 12px; }
#last-updated { color: var(--text-muted); font-size: 11px; }
#btn-refresh { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 10px; font-size: 12px; }

/* LAYOUT */
#app { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 220px; min-width: 220px; background: var(--bg-secondary);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow: hidden;
}
#sidebar-header { padding: 12px; border-bottom: 1px solid var(--border); }
#sidebar-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
#btn-new-portfolio { width: 100%; background: transparent; border: 1px dashed var(--border); color: var(--text-secondary); padding: 6px; font-size: 12px; }
#btn-new-portfolio:hover { border-color: var(--accent); color: var(--accent); }
#portfolio-list { flex: 1; overflow-y: auto; padding: 6px; }
.portfolio-item {
  padding: 8px 10px; border-radius: var(--radius); cursor: pointer;
  margin-bottom: 2px; transition: background 0.1s; display: flex;
  flex-direction: column; gap: 2px;
}
.portfolio-item:hover { background: var(--bg-card); }
.portfolio-item.active { background: rgba(212, 164, 74, 0.15); border: 1px solid rgba(212, 164, 74, 0.3); }
.portfolio-item .pname { font-weight: 600; color: var(--text-primary); font-size: 12px; }
.portfolio-item .pcount { color: var(--text-muted); font-size: 11px; }
.portfolio-item .pdel { color: var(--text-muted); font-size: 10px; margin-left: auto; padding: 1px 4px; }
.portfolio-item .pdel:hover { color: var(--red); background: rgba(196,64,64,0.1); border-radius: 3px; }
.portfolio-item-row { display: flex; align-items: center; gap: 4px; }
#sidebar-summary {
  padding: 12px; border-top: 1px solid var(--border);
  background: var(--bg-card);
}
#sidebar-summary .sum-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
#sidebar-summary .sum-value { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 2px 0; }
#sidebar-summary .sum-pl { font-size: 12px; font-weight: 600; }

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg-secondary); flex-shrink: 0; }
.tab-btn {
  padding: 10px 20px; background: transparent; color: var(--text-secondary);
  border-bottom: 2px solid transparent; border-radius: 0; font-size: 13px;
  transition: color 0.15s; cursor: pointer;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
#tab-content { flex: 1; overflow-y: auto; padding: 16px; }

/* CARDS */
.cards-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; flex: 1; min-width: 120px;
}
.card .card-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.card .card-value { font-size: 20px; font-weight: 700; color: var(--text-primary); }
.card .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* CHARTS ROW */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.chart-box h3 { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.chart-box canvas { max-height: 220px; }

/* GAINERS/LOSERS */
.gl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.gl-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.gl-box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.gl-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
.gl-item:last-child { border-bottom: none; }
.gl-item .gl-ticker { font-weight: 700; font-size: 14px; }
.gl-item .gl-pct { font-weight: 600; font-size: 13px; }

/* HOLDINGS TABLE */
#holdings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
#holdings-header h2 { font-size: 14px; font-weight: 600; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: var(--bg-card); padding: 8px 10px; text-align: right;
  color: var(--text-muted); font-weight: 600; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
thead th:first-child, thead th:last-child { text-align: left; }
tbody tr { border-bottom: 1px solid rgba(42,42,58,0.5); cursor: pointer; transition: background 0.1s; }
tbody tr:hover { background: rgba(212,164,74,0.05); }
tbody tr.selected-row { background: rgba(212,164,74,0.1); }
tbody td { padding: 7px 10px; text-align: right; color: var(--text-primary); white-space: nowrap; }
tbody td:first-child { text-align: left; }
.ticker-cell { font-weight: 700; font-size: 13px; }
.edit-cell { cursor: text; }
.edit-cell:hover { background: rgba(212,164,74,0.08); border-radius: 3px; }
.inline-input { background: var(--bg-secondary); border: 1px solid var(--accent); color: var(--text-primary); padding: 2px 5px; width: 80px; font-size: 12px; border-radius: 3px; }
.thesis-input { width: 160px; }
.pos-green { color: var(--green); }
.pos-red { color: var(--red); }
.neutral { color: var(--text-secondary); }
.cushion-red { color: var(--red); font-weight: 600; }
.cushion-orange { color: #e8a43a; font-weight: 600; }
.cushion-green { color: var(--green); }
.row-actions { display: flex; gap: 4px; }
.action-btn { background: transparent; border: none; color: var(--text-muted); padding: 2px 4px; font-size: 13px; cursor: pointer; border-radius: 3px; }
.action-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

/* ADD POSITION FORM */
#add-pos-form { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
#add-pos-form h3 { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; }
.form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.form-field { display: flex; flex-direction: column; gap: 3px; }
.form-field label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.form-field input, .form-field select { width: 110px; }
.form-field.wide input { width: 180px; }
.form-field.ticker-field input { width: 70px; }
.form-actions { display: flex; gap: 8px; align-items: flex-end; margin-top: 4px; }

/* CHARTS TAB */
#chart-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
#chart-controls label { color: var(--text-muted); font-size: 11px; }
.period-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 12px; font-size: 12px; }
.period-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,164,74,0.1); }
#price-chart-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
#price-chart-box h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
#price-chart-box canvas { height: 340px !important; }
.stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; }
.stat-card .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.stat-card .stat-value { font-size: 16px; font-weight: 700; }

/* FINANCIALS TAB */
#fin-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
.fin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
.fin-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.fin-section h3 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.fin-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(42,42,58,0.4); }
.fin-row:last-child { border-bottom: none; }
.fin-row .fin-key { color: var(--text-secondary); }
.fin-row .fin-val { color: var(--text-primary); font-weight: 600; }
.company-desc { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; line-height: 1.6; color: var(--text-secondary); font-size: 12px; }
.company-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.company-header .company-name { font-size: 18px; font-weight: 700; }
.badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; background: rgba(74,138,196,0.2); color: var(--blue); border: 1px solid rgba(74,138,196,0.3); }

/* RIGHT PANEL */
#right-panel {
  width: 300px; min-width: 300px; background: var(--bg-secondary);
  border-left: 1px solid var(--border); display: none; flex-direction: column;
  overflow-y: auto;
}
#right-panel.visible { display: flex; }
#panel-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
#panel-header h3 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
#btn-close-panel { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 0 4px; }
#panel-body { padding: 14px; flex: 1; }
.panel-ticker { font-size: 32px; font-weight: 800; color: var(--accent); }
.panel-name { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.panel-price { font-size: 22px; font-weight: 700; margin: 8px 0; }
.panel-change { font-size: 13px; margin-bottom: 12px; }
.panel-fields { display: flex; flex-direction: column; gap: 8px; }
.panel-field { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(42,42,58,0.5); }
.panel-field:last-child { border-bottom: none; }
.panel-field .pf-label { color: var(--text-muted); font-size: 11px; }
.panel-field .pf-val { font-weight: 600; font-size: 13px; cursor: text; padding: 2px 4px; border-radius: 3px; }
.panel-field .pf-val:hover { background: rgba(212,164,74,0.08); }
.panel-field .pf-input { background: var(--bg-primary); border: 1px solid var(--accent); color: var(--text-primary); padding: 3px 6px; border-radius: 3px; font-size: 12px; width: 140px; }
.panel-links { display: flex; gap: 8px; margin-top: 12px; }
.panel-links a { padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; color: var(--text-secondary); }
.panel-links a:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
.panel-close-btn { margin-top: 14px; width: 100%; background: rgba(196,64,64,0.15); border: 1px solid rgba(196,64,64,0.3); color: var(--red); padding: 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.panel-close-btn:hover { background: rgba(196,64,64,0.25); }

/* MODAL */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 1000;
  align-items: center; justify-content: center;
}
#modal-overlay.visible { display: flex; }
#modal-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; width: 380px; max-width: 90vw;
}
#modal-box h2 { font-size: 16px; margin-bottom: 16px; }
.modal-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.modal-field label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
.modal-field input, .modal-field select { width: 100%; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* CLOSE POSITION MODAL */
#close-pos-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 1000;
  align-items: center; justify-content: center;
}
#close-pos-modal.visible { display: flex; }
#close-pos-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; width: 340px;
}
#close-pos-box h2 { font-size: 15px; margin-bottom: 14px; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state p { margin-bottom: 12px; }

/* LOADING */
.loading { color: var(--text-muted); padding: 20px; text-align: center; font-style: italic; }

/* STATEMENTS TAB */
.stmt-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; overflow-x: auto; }
.stmt-section h3 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.stmt-section table { width: 100%; border-collapse: collapse; font-size: 12px; }
.stmt-section table td, .stmt-section table th { padding: 5px 8px; border-bottom: 1px solid rgba(42,42,58,0.4); white-space: nowrap; }
.stmt-section table tbody tr:last-child td { border-bottom: none; }
.stmt-section table thead th { border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.stmt-section table tbody tr:hover { background: rgba(212,164,74,0.04); }
.stmt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

/* SCREENER */
#screener-wrap { display: flex; flex-direction: column; gap: 14px; }
#screener-filters {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
#screener-filters h3 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.scr-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px; margin-bottom: 12px;
}
.scr-field { display: flex; flex-direction: column; gap: 3px; }
.scr-field label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.scr-range { display: flex; gap: 4px; align-items: center; }
.scr-range input { width: 74px; }
.scr-range span { color: var(--text-muted); font-size: 11px; }
.scr-full select, .scr-full input { width: 100%; }
.scr-actions { display: flex; gap: 8px; align-items: center; }
#screener-status { font-size: 11px; color: var(--text-muted); }
#screener-results-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
#screener-results-header h3 { font-size: 13px; font-weight: 600; }
#screener-results-info { font-size: 11px; color: var(--text-muted); }
#screener-table-wrap { overflow-x: auto; }
#screener-table { width: 100%; border-collapse: collapse; font-size: 12px; }
#screener-table thead th {
  background: var(--bg-card); padding: 7px 10px; text-align: right;
  color: var(--text-muted); font-weight: 600; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none;
}
#screener-table thead th:hover { color: var(--accent); }
#screener-table thead th:first-child, #screener-table thead th:nth-child(2),
#screener-table thead th:nth-child(3) { text-align: left; }
#screener-table tbody tr { border-bottom: 1px solid rgba(42,42,58,0.5); cursor: pointer; transition: background 0.1s; }
#screener-table tbody tr:hover { background: rgba(212,164,74,0.06); }
#screener-table tbody td { padding: 6px 10px; text-align: right; color: var(--text-primary); white-space: nowrap; }
#screener-table tbody td:first-child, #screener-table tbody td:nth-child(2),
#screener-table tbody td:nth-child(3) { text-align: left; }
.scr-ticker { font-weight: 700; font-size: 13px; color: var(--accent); }
.scr-sector-tag {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
  background: rgba(74,138,196,0.18); color: var(--blue);
}
#screener-universe-bar {
  font-size: 11px; color: var(--text-muted); padding: 4px 0;
}
.sort-arrow { margin-left: 3px; }

/* INDICATOR TOGGLE BUTTONS */
.ind-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 3px 9px; font-size: 11px; border-radius: 4px; }
.ind-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }
.ind-ma20.active  { background: rgba(74,138,196,0.12); border-color: var(--blue); color: var(--blue); }
.ind-ma50.active  { background: rgba(232,130,58,0.12); border-color: #e8823a; color: #e8823a; }
.ind-ma200.active { background: rgba(196,64,64,0.12); border-color: var(--red); color: var(--red); }
.ind-rsi.active   { background: rgba(138,106,196,0.12); border-color: #8a6ac4; color: #8a6ac4; }
.ind-macd.active  { background: rgba(74,196,192,0.12); border-color: #4ac4c0; color: #4ac4c0; }

/* FINANCIAL METRICS CARDS */
.metrics-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
.metrics-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.metrics-card h4 { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid rgba(42,42,58,0.5); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>📊 Portfolio Tracker</h1>
  <span id="refresh-timer">Prices refresh in: <span id="countdown">60</span>s</span>
  <span id="last-updated"></span>
  <button id="btn-refresh" onclick="manualRefresh()">↺ Refresh</button>
</div>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title">Portfolios</div>
      <button id="btn-new-portfolio" onclick="showNewPortfolioModal()">＋ New Portfolio</button>
    </div>
    <div id="portfolio-list"></div>
    <div id="sidebar-summary">
      <div class="sum-label">Total Value</div>
      <div class="sum-value" id="sum-value">—</div>
      <div class="sum-pl" id="sum-pl">—</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="tabs">
      <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
      <button class="tab-btn" onclick="switchTab('holdings')">Holdings</button>
      <button class="tab-btn" onclick="switchTab('charts')">Charts</button>
      <button class="tab-btn" onclick="switchTab('financials')">Financials</button>
      <button class="tab-btn" onclick="switchTab('statements')">📋 Statements</button>
      <button class="tab-btn" onclick="switchTab('screener')">🔍 Screener</button>
    </div>
    <div id="tab-content">
      <div class="empty-state">
        <div class="emoji">📂</div>
        <p>Select a portfolio to get started</p>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div id="panel-header">
      <h3>Position Detail</h3>
      <button id="btn-close-panel" onclick="closePanel()">×</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<!-- NEW PORTFOLIO MODAL -->
<div id="modal-overlay" onclick="if(event.target===this) hideModal()">
  <div id="modal-box">
    <h2>New Portfolio</h2>
    <div class="modal-field">
      <label>Name *</label>
      <input id="new-port-name" type="text" placeholder="My Portfolio">
    </div>
    <div class="modal-field">
      <label>Description</label>
      <input id="new-port-desc" type="text" placeholder="Optional description">
    </div>
    <div class="modal-field">
      <label>Benchmark</label>
      <select id="new-port-bench">
        <option value="SPY">SPY</option>
        <option value="QQQ">QQQ</option>
        <option value="IWM">IWM</option>
        <option value="DIA">DIA</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn-primary" onclick="submitNewPortfolio()">Create</button>
    </div>
  </div>
</div>

<!-- CLOSE POSITION MODAL -->
<div id="close-pos-modal" onclick="if(event.target===this) hideClosePosModal()">
  <div id="close-pos-box">
    <h2>Close Position</h2>
    <p style="color:var(--text-secondary);font-size:12px;margin-bottom:12px;">Record exit for <strong id="close-ticker-name"></strong></p>
    <div class="modal-field">
      <label>Exit Price</label>
      <input id="close-exit-price" type="number" step="0.01" placeholder="0.00">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="hideClosePosModal()">Cancel</button>
      <button class="btn-danger" onclick="submitClosePosition()">Close Position</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const S = {
  portfolios: [],
  currentPortfolioId: null,
  analytics: null,
  activeTab: 'overview',
  selectedTicker: null,
  selectedPosition: null,
  closePosTicker: null,
  priceChart: null,
  sectorChart: null,
  plChart: null,
  apexCandleChart: null,
  apexVolumeChart: null,
  countdown: 60,
  timer: null,
  showAddForm: false,
  currentPeriod: '1y',
  stmtPeriod: 'annual',
  indicators: { ma20: false, ma50: false, ma200: false, rsi: false, macd: false },
  currentChartData: null,
  apexRsiChart: null,
  apexMacdChart: null,
  // Screener
  screenerResults: [],
  screenerUniverseSize: 0,
  screenerBuilding: false,
  screenerSort: 'marketCap',
  screenerSortDir: -1,   // -1 = desc, 1 = asc
  screenerFilters: {},
  screenerLoaded: false
};

// ============================================================
// API
// ============================================================
// Override with absolute URL for hosted/GitHub-Pages version:
const API_BASE = (typeof window !== 'undefined' && window.PORTFOLIO_API_BASE) || 'http://localhost:8089';

async function api(method, url, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API_BASE + url, opts);
  return res.json();
}

// ============================================================
// INIT
// ============================================================
async function init() {
  await loadPortfolios();
  startTimer();
}

async function loadPortfolios() {
  S.portfolios = await api('GET', '/api/portfolios');
  renderSidebar();
  if (S.portfolios.length > 0) {
    const id = S.currentPortfolioId || S.portfolios[0].id;
    await selectPortfolio(id);
  }
}

async function selectPortfolio(id) {
  S.currentPortfolioId = id;
  renderSidebar();
  await loadAnalytics();
}

async function loadAnalytics() {
  if (!S.currentPortfolioId) return;
  const doc = document.getElementById('tab-content');
  doc.innerHTML = '<div class="loading">Loading…</div>';
  S.analytics = await api('GET', `/api/analytics?portfolioId=${S.currentPortfolioId}`);
  updateLastUpdated();
  renderSidebarSummary();
  renderCurrentTab();
}

async function manualRefresh() {
  S.countdown = 60;
  document.getElementById('countdown').textContent = '60';
  await loadAnalytics();
}

function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  el.textContent = 'Updated ' + new Date().toLocaleTimeString();
}

function startTimer() {
  if (S.timer) clearInterval(S.timer);
  S.timer = setInterval(async () => {
    S.countdown--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = S.countdown;
    if (S.countdown <= 0) {
      S.countdown = 60;
      if (el) el.textContent = '60';
      if (S.activeTab === 'screener') {
        await runScreen(true); // silent refresh
      } else {
        await loadAnalytics();
      }
    }
  }, 1000);
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  const list = document.getElementById('portfolio-list');
  list.innerHTML = '';
  for (const p of S.portfolios) {
    const isActive = p.id === S.currentPortfolioId;
    const div = document.createElement('div');
    div.className = 'portfolio-item' + (isActive ? ' active' : '');
    div.innerHTML = `
      <div class="portfolio-item-row">
        <span class="pname">${esc(p.name)}</span>
        <span class="pdel" onclick="event.stopPropagation(); deletePortfolio('${p.id}')" title="Delete">✕</span>
      </div>
      <span class="pcount">${p.positionCount} positions</span>
    `;
    div.addEventListener('click', () => selectPortfolio(p.id));
    list.appendChild(div);
  }
}

function renderSidebarSummary() {
  const a = S.analytics;
  if (!a || a.error) {
    document.getElementById('sum-value').textContent = '—';
    document.getElementById('sum-pl').textContent = '—';
    return;
  }
  document.getElementById('sum-value').textContent = '$' + fmt(a.totalValue);
  const plEl = document.getElementById('sum-pl');
  const sign = a.totalPL >= 0 ? '+' : '';
  plEl.textContent = `${sign}$${fmt(Math.abs(a.totalPL))} (${sign}${a.totalPLPct.toFixed(2)}%)`;
  plEl.className = 'sum-pl ' + (a.totalPL >= 0 ? 'pos-green' : 'pos-red');
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  S.activeTab = tab;
  const tabNames = ['overview','holdings','charts','financials','statements','screener'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', tabNames[i] === tab);
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (S.activeTab === 'screener') { renderScreener(); return; }
  if (!S.analytics) return;
  if (S.activeTab === 'overview') renderOverview();
  else if (S.activeTab === 'holdings') renderHoldings();
  else if (S.activeTab === 'charts') renderCharts();
  else if (S.activeTab === 'financials') renderFinancials();
  else if (S.activeTab === 'statements') renderStatements();
}

// ============================================================
// OVERVIEW TAB
// ============================================================
function renderOverview() {
  const a = S.analytics;
  if (!a || a.error) {
    document.getElementById('tab-content').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><p>' + (a ? a.error : 'No data') + '</p></div>';
    return;
  }

  const positions = a.positions || [];
  const cashPct = 0;
  const sign = a.totalPL >= 0 ? '+' : '';

  document.getElementById('tab-content').innerHTML = `
    <div class="cards-row">
      <div class="card"><div class="card-label">Total Value</div><div class="card-value">$${fmt(a.totalValue)}</div></div>
      <div class="card"><div class="card-label">Cost Basis</div><div class="card-value">$${fmt(a.totalCost)}</div></div>
      <div class="card"><div class="card-label">Gain/Loss ($)</div><div class="card-value ${a.totalPL>=0?'pos-green':'pos-red'}">${sign}$${fmt(Math.abs(a.totalPL))}</div></div>
      <div class="card"><div class="card-label">Gain/Loss (%)</div><div class="card-value ${a.totalPL>=0?'pos-green':'pos-red'}">${sign}${a.totalPLPct.toFixed(2)}%</div></div>
      <div class="card"><div class="card-label">Positions</div><div class="card-value">${positions.length}</div></div>
      <div class="card"><div class="card-label">Cash %</div><div class="card-value">${cashPct.toFixed(1)}%</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-box"><h3>Sector Allocation</h3><canvas id="chart-sector"></canvas></div>
      <div class="chart-box"><h3>P/L by Position</h3><canvas id="chart-pl"></canvas></div>
    </div>
    <div class="gl-row">
      <div class="gl-box">
        <h3 style="color:var(--green)">▲ Top Gainers</h3>
        ${(a.topGainers||[]).map(g=>`<div class="gl-item"><span class="gl-ticker">${g.ticker}</span><span class="gl-pct pos-green">+${g.plPct.toFixed(2)}%</span></div>`).join('')}
      </div>
      <div class="gl-box">
        <h3 style="color:var(--red)">▼ Top Losers</h3>
        ${(a.topLosers||[]).map(g=>`<div class="gl-item"><span class="gl-ticker">${g.ticker}</span><span class="gl-pct pos-red">${g.plPct.toFixed(2)}%</span></div>`).join('')}
      </div>
    </div>
  `;

  // Destroy old charts
  if (S.sectorChart) { S.sectorChart.destroy(); S.sectorChart = null; }
  if (S.plChart) { S.plChart.destroy(); S.plChart = null; }

  // Sector donut
  const sw = a.sectorWeights || {};
  const sectorColors = {
    'Energy': '#e8823a', 'Defense': '#4a8ac4', 'Industrials': '#8a6ac4',
    'Financials': '#40a060', 'Consumer Staples': '#d4a44a', 'Healthcare': '#c44040',
    'Communication Services': '#4ac4c0', 'Materials': '#9aa44a', 'Unknown': '#6a6a7a'
  };
  const sLabels = Object.keys(sw);
  const sData = Object.values(sw);
  const sColors = sLabels.map(l => sectorColors[l] || '#6a6a7a');
  S.sectorChart = new Chart(document.getElementById('chart-sector'), {
    type: 'doughnut',
    data: { labels: sLabels, datasets: [{ data: sData, backgroundColor: sColors, borderColor: '#16161f', borderWidth: 2 }] },
    options: {
      plugins: { legend: { position: 'right', labels: { color: '#9a9aaa', font: { size: 11 }, padding: 8 } } },
      cutout: '65%'
    }
  });

  // P/L bar chart
  const sorted = [...positions].sort((a,b) => a.plPct - b.plPct);
  const plLabels = sorted.map(p => p.ticker);
  const plData = sorted.map(p => p.plPct);
  const plColors = plData.map(v => v >= 0 ? 'rgba(64,160,96,0.8)' : 'rgba(196,64,64,0.8)');
  S.plChart = new Chart(document.getElementById('chart-pl'), {
    type: 'bar',
    data: { labels: plLabels, datasets: [{ data: plData, backgroundColor: plColors, borderRadius: 3 }] },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(42,42,58,0.5)' }, ticks: { color: '#9a9aaa', callback: v => v.toFixed(1)+'%' } },
        y: { grid: { display: false }, ticks: { color: '#9a9aaa', font: { size: 10 } } }
      }
    }
  });
}

// ============================================================
// HOLDINGS TAB
// ============================================================
function renderHoldings() {
  const a = S.analytics;
  const positions = a && a.positions ? a.positions : [];

  const addFormHtml = S.showAddForm ? renderAddForm() : '';

  const rows = positions.map(p => {
    const upside = p.upside !== null ? `<span class="pos-green">${p.upside > 0 ? '+' : ''}${p.upside.toFixed(1)}%</span>` : '—';
    const cushionClass = p.cushion === null ? 'neutral' : p.cushion < 5 ? 'cushion-red' : p.cushion < 10 ? 'cushion-orange' : 'cushion-green';
    const cushion = p.cushion !== null ? `<span class="${cushionClass}">${p.cushion.toFixed(1)}%</span>` : '—';
    const plClass = p.plPct >= 0 ? 'pos-green' : 'pos-red';
    const changeClass = p.changePct >= 0 ? 'pos-green' : 'pos-red';
    const selected = S.selectedPosition && S.selectedPosition.ticker === p.ticker ? ' selected-row' : '';
    return `<tr class="pos-row${selected}" data-ticker="${p.ticker}" onclick="selectPosition('${p.ticker}')">
      <td class="ticker-cell">${p.ticker}</td>
      <td class="edit-cell" data-field="shares" data-ticker="${p.ticker}" onclick="event.stopPropagation(); startEdit(this, '${p.ticker}', 'shares')" title="Click to edit shares">${p.shares}</td>
      <td class="edit-cell" data-field="avgEntry" data-ticker="${p.ticker}" onclick="event.stopPropagation(); startEdit(this, '${p.ticker}', 'avgEntry')" title="Click to edit cost basis">$${p.avgEntry.toFixed(2)}</td>
      <td><span class="${changeClass}">$${p.livePrice > 0 ? p.livePrice.toFixed(2) : '—'}</span><br><span style="font-size:10px;color:var(--text-muted)">${p.changePct >= 0 ? '+' : ''}${p.changePct.toFixed(2)}%</span></td>
      <td>$${fmt(p.marketValue)}</td>
      <td>${p.weight.toFixed(1)}%</td>
      <td>$${fmt(p.cost)}</td>
      <td class="${plClass}">${p.pl >= 0 ? '+' : ''}$${fmt(Math.abs(p.pl))}</td>
      <td class="${plClass}">${p.plPct >= 0 ? '+' : ''}${p.plPct.toFixed(2)}%</td>
      <td class="edit-cell" data-field="target" data-ticker="${p.ticker}" onclick="event.stopPropagation(); startEdit(this, '${p.ticker}', 'target')">${p.target ? '$'+p.target.toFixed(2) : '—'}</td>
      <td>${upside}</td>
      <td class="edit-cell" data-field="stop" data-ticker="${p.ticker}" onclick="event.stopPropagation(); startEdit(this, '${p.ticker}', 'stop')">${p.stop ? '$'+p.stop.toFixed(2) : '—'}</td>
      <td>${cushion}</td>
      <td>${p.entryDate || '—'}</td>
      <td class="edit-cell" style="max-width:160px;overflow:hidden;text-overflow:ellipsis" data-field="thesis" data-ticker="${p.ticker}" onclick="event.stopPropagation(); startEdit(this, '${p.ticker}', 'thesis')" title="${esc(p.thesis)}">${esc(p.thesis) || '—'}</td>
      <td onclick="event.stopPropagation()">
        <div class="row-actions">
          <button class="action-btn" onclick="editRow('${p.ticker}')" title="Edit">✏️</button>
          <button class="action-btn" onclick="deletePos('${p.ticker}')" title="Delete">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tab-content').innerHTML = `
    <div id="holdings-header">
      <h2>Holdings (${positions.length})</h2>
      <button class="btn-primary" onclick="toggleAddForm()">＋ Add Position</button>
    </div>
    ${addFormHtml}
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="text-align:left">Ticker</th>
          <th title="Click to edit">Shares ✏</th><th title="Click to edit">Avg Entry ✏</th><th>Live Price</th>
          <th>Mkt Value</th><th>Weight</th><th>Cost</th>
          <th>P/L $</th><th>P/L %</th>
          <th>Target</th><th>Upside</th><th>Stop</th><th>Cushion</th>
          <th>Entry Date</th><th>Thesis</th><th></th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="16" style="text-align:center;padding:20px;color:var(--text-muted)">No positions. Add one above.</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

function renderAddForm() {
  return `<div id="add-pos-form">
    <h3>Add / Update Position</h3>
    <div class="form-row">
      <div class="form-field ticker-field">
        <label>Ticker *</label>
        <input id="ap-ticker" type="text" placeholder="XOM" onblur="autoFillSector()">
      </div>
      <div class="form-field">
        <label>Shares *</label>
        <input id="ap-shares" type="number" placeholder="100">
      </div>
      <div class="form-field">
        <label>Avg Entry *</label>
        <input id="ap-entry" type="number" step="0.01" placeholder="0.00">
      </div>
      <div class="form-field">
        <label>Entry Date</label>
        <input id="ap-date" type="date" value="${new Date().toISOString().slice(0,10)}">
      </div>
      <div class="form-field">
        <label>Target</label>
        <input id="ap-target" type="number" step="0.01" placeholder="0.00">
      </div>
      <div class="form-field">
        <label>Stop</label>
        <input id="ap-stop" type="number" step="0.01" placeholder="0.00">
      </div>
      <div class="form-field">
        <label>Sector</label>
        <input id="ap-sector" type="text" placeholder="Energy">
      </div>
      <div class="form-field wide">
        <label>Thesis</label>
        <input id="ap-thesis" type="text" placeholder="Brief investment thesis">
      </div>
    </div>
    <div class="form-actions" style="margin-top:10px">
      <button class="btn-primary" onclick="submitAddPosition()">Add Position</button>
      <button class="btn-ghost" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>`;
}

function toggleAddForm() {
  S.showAddForm = !S.showAddForm;
  renderHoldings();
}

async function autoFillSector() {
  const ticker = document.getElementById('ap-ticker').value.trim().toUpperCase();
  if (!ticker) return;
  try {
    const fin = await api('GET', `/api/financials?ticker=${ticker}`);
    if (fin.sector) {
      const el = document.getElementById('ap-sector');
      if (el && !el.value) el.value = fin.sector;
    }
  } catch(e) {}
}

async function submitAddPosition() {
  const ticker = (document.getElementById('ap-ticker').value || '').trim().toUpperCase();
  const shares = parseFloat(document.getElementById('ap-shares').value || 0);
  const entry = parseFloat(document.getElementById('ap-entry').value || 0);
  if (!ticker || !shares || !entry) { alert('Ticker, shares, and avg entry are required.'); return; }
  const body = {
    portfolioId: S.currentPortfolioId, ticker, shares, avgEntry: entry,
    entryDate: document.getElementById('ap-date').value,
    target: document.getElementById('ap-target').value || null,
    stop: document.getElementById('ap-stop').value || null,
    sector: document.getElementById('ap-sector').value,
    thesis: document.getElementById('ap-thesis').value
  };
  await api('POST', '/api/positions', body);
  S.showAddForm = false;
  await loadAnalytics();
}

async function deletePos(ticker) {
  if (!confirm(`Remove ${ticker} from this portfolio?`)) return;
  await api('DELETE', '/api/positions', { portfolioId: S.currentPortfolioId, ticker });
  if (S.selectedPosition && S.selectedPosition.ticker === ticker) closePanel();
  await loadAnalytics();
}

function editRow(ticker) {
  // Pre-fill add form with position data
  const pos = (S.analytics.positions || []).find(p => p.ticker === ticker);
  if (!pos) return;
  S.showAddForm = true;
  renderHoldings();
  // Fill fields
  document.getElementById('ap-ticker').value = pos.ticker;
  document.getElementById('ap-shares').value = pos.shares;
  document.getElementById('ap-entry').value = pos.avgEntry;
  document.getElementById('ap-date').value = pos.entryDate || '';
  document.getElementById('ap-target').value = pos.target || '';
  document.getElementById('ap-stop').value = pos.stop || '';
  document.getElementById('ap-sector').value = pos.sector || '';
  document.getElementById('ap-thesis').value = pos.thesis || '';
}

function startEdit(cell, ticker, field) {
  const pos = (S.analytics.positions || []).find(p => p.ticker === ticker);
  if (!pos) return;
  const cur = pos[field] || '';
  const isThesis = field === 'thesis';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'inline-input' + (isThesis ? ' thesis-input' : '');
  inp.value = isThesis ? cur : (cur ? (typeof cur === 'number' ? cur.toFixed(2) : cur) : '');
  inp.placeholder = isThesis ? 'Thesis...' : '0.00';
  cell.innerHTML = '';
  cell.appendChild(inp);
  inp.focus();
  inp.select();
  inp.addEventListener('blur', async () => {
    const val = inp.value.trim();
    const update = { portfolioId: S.currentPortfolioId, ticker };
    update[field] = isThesis ? val : (val === '' ? null : parseFloat(val));
    await api('PUT', '/api/positions', update);
    await loadAnalytics();
    if (S.selectedPosition && S.selectedPosition.ticker === ticker) {
      const updatedPos = (S.analytics.positions || []).find(p => p.ticker === ticker);
      if (updatedPos) renderPanel(updatedPos);
    }
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = isThesis ? cur : (cur ? cur.toFixed(2) : ''); inp.blur(); } });
}

// ============================================================
// CHARTS TAB  (ApexCharts candlestick)
// ============================================================
function renderCharts() {
  const positions = S.analytics && S.analytics.positions ? S.analytics.positions : [];
  const tickers = positions.map(p => p.ticker);
  const selected = S.selectedTicker || (tickers[0] || '');
  const options = tickers.map(t => `<option value="${t}" ${t===selected?'selected':''}>${t}</option>`).join('');
  const periods = ['1wk','1mo','3mo','6mo','1y'];
  const periodLabels = { '1wk':'1W','1mo':'1M','3mo':'3M','6mo':'6M','1y':'1Y' };
  const periodBtns = periods.map(p =>
    `<button class="period-btn${p===S.currentPeriod?' active':''}" onclick="selectPeriod('${p}')">${periodLabels[p]}</button>`
  ).join('');

  const ind = S.indicators;
  document.getElementById('tab-content').innerHTML = `
    <div id="chart-controls" style="padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg-secondary);flex-shrink:0">
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <label>Ticker:</label>
        <select id="chart-ticker-sel" onchange="selectChartTicker(this.value)">${options}</select>
        <div style="display:flex;gap:4px">${periodBtns}</div>
      </div>
      <div style="display:flex;gap:4px;align-items:center;margin-top:8px;flex-wrap:wrap">
        <span style="color:var(--text-muted);font-size:11px;margin-right:2px">Indicators:</span>
        <button class="ind-btn ind-ma20${ind.ma20?' active':''}" onclick="toggleIndicator('ma20')">MA 20</button>
        <button class="ind-btn ind-ma50${ind.ma50?' active':''}" onclick="toggleIndicator('ma50')">MA 50</button>
        <button class="ind-btn ind-ma200${ind.ma200?' active':''}" onclick="toggleIndicator('ma200')">MA 200</button>

function selectChartTicker(ticker) {
  S.selectedTicker = ticker;
  const titleEl = document.getElementById('candle-chart-title');
  if (titleEl) titleEl.textContent = ticker + ' \u2014 Loading\u2026';
  loadCandleChart(ticker).then(() => loadChartStats(ticker));
}

function selectPeriod(period) {
  S.currentPeriod = period;
  document.querySelectorAll('#chart-controls .period-btn').forEach(b => {
    const labels = {'1wk':'1W','1mo':'1M','3mo':'3M','6mo':'6M','1y':'1Y'};
    b.classList.toggle('active', labels[period] === b.textContent);
  });
  if (S.selectedTicker) loadCandleChart(S.selectedTicker).then(() => loadChartStats(S.selectedTicker));

async function loadCandleChart(ticker) {
  // Destroy existing ApexCharts instances
  if (S.apexCandleChart) { try { S.apexCandleChart.destroy(); } catch(e){} S.apexCandleChart = null; }
  if (S.apexVolumeChart) { try { S.apexVolumeChart.destroy(); } catch(e){} S.apexVolumeChart = null; }
  if (S.apexRsiChart)    { try { S.apexRsiChart.destroy();    } catch(e){} S.apexRsiChart = null; }
  if (S.apexMacdChart)   { try { S.apexMacdChart.destroy();   } catch(e){} S.apexMacdChart = null; }

  const candleEl = document.getElementById('candle-chart');
  const volEl    = document.getElementById('volume-chart');
  const titleEl  = document.getElementById('candle-chart-title');
  if (!candleEl || !volEl) return;

  const data = await api('GET', `/api/chart?ticker=${ticker}&period=${S.currentPeriod}`);

  if (!data.dates || !data.dates.length) {
    if (titleEl) titleEl.textContent = ticker + ' \u2014 No data';
    return;
  }

  // Cache for indicator toggles (no re-fetch needed)
  S.currentChartData = data;

  // Build candlestick chart (with any active MA overlays)
  await buildCandleChartFromData(data, ticker);

  // --- Volume chart ---
  const volArr = data.volume || data.volumes || [];
  const volSeries = data.dates.map((d, i) => ({
    x: new Date(d).getTime(),
    y: volArr[i] || 0,
    fillColor: (data.close[i] >= (data.open ? data.open[i] : data.close[i])) ? '#40a060' : '#c44040'
  }));

  const volOpts = {
    series: [{ name: 'Volume', data: volSeries }],
    chart: { type: 'bar', height: 110, background: '#0a0a0f', foreColor: '#9a9aaa', toolbar: { show: false }, animations: { enabled: false } },
    theme: { mode: 'dark' },
    grid: { borderColor: '#2a2a3a' },
    dataLabels: { enabled: false },
    plotOptions: { bar: { columnWidth: '80%' } },
    xaxis: { type: 'datetime', labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
    yaxis: { labels: { style: { colors: '#9a9aaa' }, formatter: v => fmtVol(v) }, tickAmount: 2 },
    tooltip: { theme: 'dark', x: { format: 'dd MMM yyyy' } },
    fill: { opacity: 0.85 }
  };

  S.apexVolumeChart = new ApexCharts(volEl, volOpts);
  await S.apexVolumeChart.render();

  // Render indicator sub-charts if active
  if (S.indicators.rsi)  renderRsiChart(data);
  if (S.indicators.macd) renderMacdChart(data);

  if (titleEl) titleEl.textContent = ticker + ' \u2014 Candlestick';

  // --- OHLCV stats ---
  const statsEl = document.getElementById('chart-stats');
  if (statsEl && data.close && data.close.length) {
    const last   = data.close.length - 1;
    const prev   = last > 0 ? data.close[last - 1] : data.close[last];
    const chg    = data.close[last] - prev;
    const chgPct = prev !== 0 ? (chg / prev * 100) : 0;
    const chgCls = chg >= 0 ? 'pos-green' : 'pos-red';
    const vol    = volArr[last] || 0;
    const openV  = data.open ? data.open[last]  : data.close[last];
    const highV  = data.high ? data.high[last]  : data.close[last];
    const lowV   = data.low  ? data.low[last]   : data.close[last];
    statsEl.innerHTML = `
      <div class="stats-row" style="margin-bottom:10px">
        <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value">$${openV.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">High</div><div class="stat-value pos-green">$${highV.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Low</div><div class="stat-value pos-red">$${lowV.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Close</div><div class="stat-value">$${data.close[last].toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Volume</div><div class="stat-value">${fmtVol(vol)}</div></div>
        <div class="stat-card"><div class="stat-label">Change</div><div class="stat-value ${chgCls}">${chg >= 0 ? '+' : ''}${chgPct.toFixed(2)}%</div></div>
      </div>
      <div class="stats-row" id="fin-stats-row" style="flex-wrap:wrap">
        <div class="loading" style="font-size:11px">Loading financials\u2026</div>
      </div>
    `;
  }
}

async function buildCandleChartFromData(data, ticker) {
  const candleEl = document.getElementById('candle-chart');
  if (!candleEl) return;

  // Base candlestick series
  const candleSeries = data.dates.map((d, i) => ({
    x: new Date(d).getTime(),
    y: [
      data.open  ? data.open[i]  : data.close[i],
      data.high  ? data.high[i]  : data.close[i],
      data.low   ? data.low[i]   : data.close[i],
      data.close[i]
    ]
  }));

  const timestamps = data.dates.map(d => new Date(d).getTime());
  const closes = data.close;

  // Build series array — always start with candlestick, then add active MAs
  const allSeries = [{ name: 'Price', type: 'candlestick', data: candleSeries }];
  const colors = ['#d4a44a'];           // index 0 for candle (overridden by plotOptions)
  const strokeWidths = [1];

  if (S.indicators.ma20) {
    const ma = calcMA(closes, 20);
    allSeries.push({ name: 'MA 20', type: 'line',
      data: timestamps.map((x, i) => ({ x, y: ma[i] })).filter(p => p.y !== null) });
    colors.push('#4a8ac4');  strokeWidths.push(1.5);
  }
  if (S.indicators.ma50) {
    const ma = calcMA(closes, 50);
    allSeries.push({ name: 'MA 50', type: 'line',
      data: timestamps.map((x, i) => ({ x, y: ma[i] })).filter(p => p.y !== null) });
    colors.push('#e8823a');  strokeWidths.push(1.5);
  }
  if (S.indicators.ma200) {
    const ma = calcMA(closes, 200);
    allSeries.push({ name: 'MA 200', type: 'line',
      data: timestamps.map((x, i) => ({ x, y: ma[i] })).filter(p => p.y !== null) });
    colors.push('#c44040');  strokeWidths.push(1.5);
  }

  // Annotations from position data
  const positions = S.analytics && S.analytics.positions ? S.analytics.positions : [];
  const pos = ticker ? positions.find(p => p.ticker === ticker) : null;
  const yAnnotations = [];
  if (pos) {
    if (pos.avgEntry) yAnnotations.push({ y: pos.avgEntry, borderColor: '#d4a44a', borderWidth: 2, strokeDashArray: 5,
      label: { text: 'Entry $' + pos.avgEntry.toFixed(2), position: 'right', style: { background: '#d4a44a', color: '#0a0a0f', fontSize: '10px', padding: { left:6, right:6, top:2, bottom:2 } } } });
    if (pos.target) yAnnotations.push({ y: pos.target, borderColor: '#40a060', borderWidth: 2, strokeDashArray: 5,
      label: { text: 'Target $' + pos.target.toFixed(2), position: 'right', style: { background: '#40a060', color: '#fff', fontSize: '10px', padding: { left:6, right:6, top:2, bottom:2 } } } });
    if (pos.stop) yAnnotations.push({ y: pos.stop, borderColor: '#c44040', borderWidth: 2, strokeDashArray: 5,
      label: { text: 'Stop $' + pos.stop.toFixed(2), position: 'right', style: { background: '#c44040', color: '#fff', fontSize: '10px', padding: { left:6, right:6, top:2, bottom:2 } } } });
  }

  const hasLines = allSeries.length > 1;

  const candleOpts = {
    series: allSeries,
    chart: {
      id: 'candle-main',
      type: 'line',   // must be 'line' to support mixed candlestick + line series
      height: 420,
      background: '#0a0a0f',
      foreColor: '#9a9aaa',
      toolbar: { show: true, tools: { download: false, selection: true, zoom: true, zoomin: true, zoomout: true, pan: true, reset: true } },
      zoom: { enabled: true },
      animations: { enabled: false }
    },
    theme: { mode: 'dark' },
    colors: colors,
    stroke: { show: true, width: strokeWidths, curve: 'smooth' },
    legend: { show: hasLines, position: 'top', labels: { colors: '#9a9aaa' }, itemMargin: { horizontal: 8 } },
    grid: { borderColor: '#2a2a3a', xaxis: { lines: { show: false } } },
    xaxis: {
      type: 'datetime',
      labels: { style: { colors: '#9a9aaa' }, datetimeUTC: false },
      axisBorder: { color: '#2a2a3a' },
      axisTicks: { color: '#2a2a3a' }
    },
    yaxis: {
      labels: { style: { colors: '#9a9aaa' }, formatter: v => '$' + v.toFixed(2) },
      tooltip: { enabled: true }
    },
    tooltip: { theme: 'dark', x: { format: 'dd MMM yyyy' } },
    annotations: { yaxis: yAnnotations },
    plotOptions: {
      candlestick: { colors: { upward: '#40a060', downward: '#c44040' }, wick: { useFillColor: true } }
    }
  };

  S.apexCandleChart = new ApexCharts(candleEl, candleOpts);
  await S.apexCandleChart.render();
}

function toggleIndicator(name) {
  S.indicators[name] = !S.indicators[name];
  // Sync button active state
  document.querySelectorAll('.ind-btn').forEach(btn => {
    if (btn.classList.contains('ind-' + name))
      btn.classList.toggle('active', S.indicators[name]);
  });

  if (!S.currentChartData) return;
  const data = S.currentChartData;
  const ticker = S.selectedTicker;

  if (name === 'ma20' || name === 'ma50' || name === 'ma200') {
    // Rebuild candle chart with updated overlay set (uses cached data — no API call)
    if (S.apexCandleChart) { try { S.apexCandleChart.destroy(); } catch(e){} S.apexCandleChart = null; }
    buildCandleChartFromData(data, ticker);
  } else if (name === 'rsi') {
    const wrap = document.getElementById('rsi-chart-wrap');
    if (!wrap) return;
    if (S.indicators.rsi) {
      wrap.style.display = 'block';
      if (S.apexRsiChart) { try { S.apexRsiChart.destroy(); } catch(e){} S.apexRsiChart = null; }
      renderRsiChart(data);
    } else {
      wrap.style.display = 'none';
      if (S.apexRsiChart) { try { S.apexRsiChart.destroy(); } catch(e){} S.apexRsiChart = null; }
    }
  } else if (name === 'macd') {
    const wrap = document.getElementById('macd-chart-wrap');
    if (!wrap) return;
    if (S.indicators.macd) {
      wrap.style.display = 'block';
      if (S.apexMacdChart) { try { S.apexMacdChart.destroy(); } catch(e){} S.apexMacdChart = null; }
      renderMacdChart(data);
    } else {
      wrap.style.display = 'none';
      if (S.apexMacdChart) { try { S.apexMacdChart.destroy(); } catch(e){} S.apexMacdChart = null; }
    }
  }
}

// --- Indicator Calculations ---
function calcMA(values, period) {
  return values.map((v, i) => {
    if (i < period - 1) return null;
    let s = 0;
    for (let j = i - period + 1; j <= i; j++) s += values[j];
    return +(s / period).toFixed(4);
  });
}

function calcEMA(values, period) {
  const k = 2 / (period + 1);
  const ema = [];
  let seeded = false;
  let prev = 0;
  let count = 0, sum = 0;
  for (let i = 0; i < values.length; i++) {
    if (values[i] === null || values[i] === undefined) { ema.push(null); continue; }
    if (!seeded) {
      count++;  sum += values[i];
      if (count === period) {
        prev = sum / period;
        seeded = true;
        ema.push(+prev.toFixed(6));
      } else {
        ema.push(null);
      }
    } else {
      prev = values[i] * k + prev * (1 - k);
      ema.push(+prev.toFixed(6));
    }
  }
  return ema;
}

function calcRSI(values, period = 14) {
  if (values.length <= period) return values.map(() => null);
  const rsi = new Array(period).fill(null);
  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= period; i++) {
    const d = values[i] - values[i - 1];
    if (d > 0) avgGain += d; else avgLoss += Math.abs(d);
  }
  avgGain /= period;  avgLoss /= period;
  rsi.push(avgLoss === 0 ? 100 : +(100 - 100 / (1 + avgGain / avgLoss)).toFixed(2));
  for (let i = period + 1; i < values.length; i++) {
    const d = values[i] - values[i - 1];
    const g = d > 0 ? d : 0;
    const l = d < 0 ? Math.abs(d) : 0;
    avgGain = (avgGain * (period - 1) + g) / period;
    avgLoss = (avgLoss * (period - 1) + l) / period;
    rsi.push(avgLoss === 0 ? 100 : +(100 - 100 / (1 + avgGain / avgLoss)).toFixed(2));
  }
  return rsi;
}

function calcMACD(values) {
  const ema12 = calcEMA(values, 12);
  const ema26 = calcEMA(values, 26);
  const macdLine = ema12.map((v, i) =>
    (v !== null && ema26[i] !== null) ? +(v - ema26[i]).toFixed(4) : null);
  const signal = calcEMA(macdLine, 9);
  const histogram = macdLine.map((v, i) =>
    (v !== null && signal[i] !== null) ? +(v - signal[i]).toFixed(4) : null);
  return { macdLine, signal, histogram };
}

// --- Sub-chart Renderers ---
function renderRsiChart(data) {
  const el = document.getElementById('rsi-chart');
  if (!el) return;
  const rsi = calcRSI(data.close, 14);
  const timestamps = data.dates.map(d => new Date(d).getTime());
  const rsiSeries = timestamps
    .map((x, i) => ({ x, y: rsi[i] }))
    .filter(p => p.y !== null);

  const opts = {
    series: [{ name: 'RSI 14', data: rsiSeries }],
    chart: { type: 'line', height: 140, background: '#0a0a0f', foreColor: '#9a9aaa',
             toolbar: { show: false }, animations: { enabled: false }, zoom: { enabled: false } },
    theme: { mode: 'dark' },
    colors: ['#8a6ac4'],
    stroke: { width: 1.5, curve: 'smooth' },
    fill: { opacity: 1 },
    dataLabels: { enabled: false },
    legend: { show: false },
    grid: { borderColor: '#2a2a3a', xaxis: { lines: { show: false } } },
    xaxis: { type: 'datetime', labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
    yaxis: {
      min: 0, max: 100, tickAmount: 4,
      labels: { style: { colors: '#9a9aaa', fontSize: '10px' }, formatter: v => v.toFixed(0) }
    },
    tooltip: { theme: 'dark', x: { format: 'dd MMM yyyy' }, y: { formatter: v => v ? v.toFixed(1) : '' } },
    annotations: {
      yaxis: [
        { y: 70, borderColor: '#c44040', borderWidth: 1, strokeDashArray: 4,
          label: { text: 'OB 70', position: 'right', style: { background: 'rgba(10,10,15,0.8)', color: '#c44040', fontSize: '10px', padding: { left:3, right:3, top:1, bottom:1 } } } },
        { y: 30, borderColor: '#40a060', borderWidth: 1, strokeDashArray: 4,
          label: { text: 'OS 30', position: 'right', style: { background: 'rgba(10,10,15,0.8)', color: '#40a060', fontSize: '10px', padding: { left:3, right:3, top:1, bottom:1 } } } }
      ]
    }
  };

  S.apexRsiChart = new ApexCharts(el, opts);
  S.apexRsiChart.render();
}

function renderMacdChart(data) {
  const el = document.getElementById('macd-chart');
  if (!el) return;
  const { macdLine, signal, histogram } = calcMACD(data.close);
  const timestamps = data.dates.map(d => new Date(d).getTime());

  const macdSeries  = timestamps.map((x, i) => ({ x, y: macdLine[i]  })).filter(p => p.y !== null);
  const signalSeries = timestamps.map((x, i) => ({ x, y: signal[i]   })).filter(p => p.y !== null);
  const histSeries  = timestamps.map((x, i) => ({
    x, y: histogram[i],
    fillColor: histogram[i] !== null ? (histogram[i] >= 0 ? 'rgba(64,160,96,0.7)' : 'rgba(196,64,64,0.7)') : 'transparent'
  })).filter(p => p.y !== null);

  const opts = {
    series: [
      { name: 'Histogram', type: 'bar',  data: histSeries },
      { name: 'MACD',      type: 'line', data: macdSeries },
      { name: 'Signal',    type: 'line', data: signalSeries }
    ],
    chart: { type: 'line', height: 140, background: '#0a0a0f', foreColor: '#9a9aaa',
             toolbar: { show: false }, animations: { enabled: false }, zoom: { enabled: false } },
    theme: { mode: 'dark' },
    colors: ['#4ac4c0', '#4ac4c0', '#e8823a'],
    stroke: { width: [0, 1.5, 1.5], curve: 'smooth' },
    dataLabels: { enabled: false },
    legend: { show: true, position: 'top', labels: { colors: '#9a9aaa' }, itemMargin: { horizontal: 8 }, fontSize: '11px' },
    grid: { borderColor: '#2a2a3a', xaxis: { lines: { show: false } } },
    xaxis: { type: 'datetime', labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
    yaxis: {
      labels: { style: { colors: '#9a9aaa', fontSize: '10px' }, formatter: v => v !== null ? v.toFixed(2) : '' }
    },
    tooltip: { theme: 'dark', x: { format: 'dd MMM yyyy' } },
    plotOptions: { bar: { columnWidth: '60%' } }
  };

  S.apexMacdChart = new ApexCharts(el, opts);
  S.apexMacdChart.render();
}

function renderFinancials() {

  const tickers = positions.map(p => p.ticker);
  const selected = S.selectedTicker || (tickers[0] || '');

async function loadFinancials(ticker) {
  S.selectedTicker = ticker;
  const body = document.getElementById('fin-body');
  if (!body) return;
  body.innerHTML = '<div class="loading">Loading…</div>';
  const fin = await api('GET', `/api/financials?ticker=${ticker}`);
  if (fin.error && !fin.shortName) { body.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>${fin.error}</p></div>`; return; }

  body.innerHTML = `
    <div class="company-header">
      <span style="font-size:28px;font-weight:800;color:var(--accent)">${ticker}</span>
      <div>

function selectPosition(ticker) {
  const pos = (S.analytics && S.analytics.positions ? S.analytics.positions : []).find(p => p.ticker === ticker);
  if (!pos) return;
  S.selectedPosition = pos;
  // Highlight row
  document.querySelectorAll('.pos-row').forEach(r => r.classList.toggle('selected-row', r.dataset.ticker === ticker));
  renderPanel(pos);
  document.getElementById('right-panel').classList.add('visible');
}

function renderPanel(pos) {
  const panel = document.getElementById('panel-body');
  const plClass = pos.plPct >= 0 ? 'pos-green' : 'pos-red';
  const sign = pos.plPct >= 0 ? '+' : '';
  const changeClass = pos.changePct >= 0 ? 'pos-green' : 'pos-red';
  const upside = pos.upside !== null ? `${pos.upside > 0 ? '+' : ''}${pos.upside.toFixed(1)}%` : '—';
  const cushion = pos.cushion !== null ? `${pos.cushion.toFixed(1)}%` : '—';

  panel.innerHTML = `
    <div class="panel-ticker">${pos.ticker}</div>
    <div class="panel-name" id="panel-company-name">Loading…</div>
    ${pos.sector ? `<span class="badge" style="margin-bottom:8px;display:inline-block">${esc(pos.sector)}</span>` : ''}
    <div class="panel-price">${pos.livePrice > 0 ? '$'+pos.livePrice.toFixed(2) : '—'}</div>
    <div class="panel-change ${changeClass}">${pos.changePct >= 0?'+':''}${pos.changePct.toFixed(2)}% today</div>
    <div class="panel-fields">
      ${panelField('P/L', `<span class="${plClass}">${sign}$${fmt(Math.abs(pos.pl))} (${sign}${pos.plPct.toFixed(2)}%)</span>`)}
      ${panelField('Shares', pos.shares)}
      ${panelField('Avg Entry', '$'+pos.avgEntry.toFixed(2))}
      ${panelField('Market Value', '$'+fmt(pos.marketValue))}
      ${panelField('Cost Basis', '$'+fmt(pos.cost))}
      ${panelEditField('Target', pos.ticker, 'target', pos.target ? '$'+pos.target.toFixed(2) : '—')}
      ${panelField('Upside', `<span class="pos-green">${upside}</span>`)}
      ${panelEditField('Stop', pos.ticker, 'stop', pos.stop ? '$'+pos.stop.toFixed(2) : '—')}
      ${panelField('Cushion', cushion)}
      ${panelField('Entry Date', pos.entryDate || '—')}
      ${panelEditField('Thesis', pos.ticker, 'thesis', pos.thesis || '—')}
      ${panelEditField('Notes', pos.ticker, 'notes', pos.notes || '—')}
      ${panelField('Weight', pos.weight.toFixed(1)+'%')}
    </div>
    <div class="panel-links">
      <a href="https://finance.yahoo.com/quote/${pos.ticker}" target="_blank">Yahoo Finance</a>
      <a href="https://finviz.com/quote.ashx?t=${pos.ticker}" target="_blank">Finviz</a>
    </div>
    <button class="panel-close-btn" onclick="showClosePosModal('${pos.ticker}')">🔴 Close Position</button>
  `;

  // Async load company name
  api('GET', `/api/financials?ticker=${pos.ticker}`).then(fin => {
    const el = document.getElementById('panel-company-name');
    if (el && fin.shortName) el.textContent = fin.shortName;
  }).catch(() => {});
}

function panelField(label, val) {
  return `<div class="panel-field"><span class="pf-label">${label}</span><span class="pf-val">${val}</span></div>`;
}

function panelEditField(label, ticker, field, displayVal) {
  return `<div class="panel-field">
    <span class="pf-label">${label}</span>
    <span class="pf-val" onclick="startPanelEdit(this, '${ticker}', '${field}')">${displayVal}</span>
  </div>`;
}

function startPanelEdit(span, ticker, field) {
  const pos = (S.analytics && S.analytics.positions ? S.analytics.positions : []).find(p => p.ticker === ticker);
  if (!pos) return;
  const cur = pos[field] || '';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'pf-input';
  inp.value = field === 'thesis' || field === 'notes' ? cur : (cur ? parseFloat(cur).toFixed(2) : '');
  inp.placeholder = field === 'thesis' || field === 'notes' ? label + '...' : '0.00';
  span.replaceWith(inp);
  inp.focus();
  inp.select();
  const save = async () => {
    const val = inp.value.trim();
    const isText = field === 'thesis' || field === 'notes';
    const update = { portfolioId: S.currentPortfolioId, ticker };
    update[field] = isText ? val : (val === '' ? null : parseFloat(val));
    await api('PUT', '/api/positions', update);
    await loadAnalytics();
    const updatedPos = (S.analytics && S.analytics.positions ? S.analytics.positions : []).find(p => p.ticker === ticker);
    if (updatedPos) {
      S.selectedPosition = updatedPos;
      renderPanel(updatedPos);
    }
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.blur(); } });
}

function closePanel() {
  document.getElementById('right-panel').classList.remove('visible');
  S.selectedPosition = null;
  document.querySelectorAll('.pos-row').forEach(r => r.classList.remove('selected-row'));
}

function showNewPortfolioModal() {

  document.getElementById('new-port-desc').value = '';
  document.getElementById('new-port-bench').value = 'SPY';
  document.getElementById('modal-overlay').classList.add('visible');
  setTimeout(() => document.getElementById('new-port-name').focus(), 50);
}
function hideModal() { document.getElementById('modal-overlay').classList.remove('visible'); }

async function submitNewPortfolio() {
  const name = document.getElementById('new-port-name').value.trim();
  if (!name) { alert('Portfolio name is required.'); return; }
  const p = await api('POST', '/api/portfolios', {
    name,
    description: document.getElementById('new-port-desc').value,
    benchmark: document.getElementById('new-port-bench').value
  });
  hideModal();
  await loadPortfolios();
  await selectPortfolio(p.id);
}

async function deletePortfolio(id) {
  const p = S.portfolios.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`Delete portfolio "${p.name}"? This cannot be undone.`)) return;
  await api('DELETE', '/api/portfolios', { id });
  if (S.currentPortfolioId === id) {
    S.currentPortfolioId = null;
    S.analytics = null;
    closePanel();
  }
  await loadPortfolios();
}

async function loadStatements(ticker) {
  S.selectedTicker = ticker;
  const body = document.getElementById('stmt-body');
  if (!body) return;
  body.innerHTML = `<div class="loading">Loading statements for ${ticker}\u2026</div>`;
  try {
    const data = await api('GET', `/api/statements?ticker=${ticker}`);
    if (data.error && !data.income) {
      body.innerHTML = `<div class="empty-state"><div class="emoji">\u26A0\uFE0F</div><p>Data unavailable for ${ticker}</p></div>`;
      return;
    }
    const period  = S.stmtPeriod;
    const income  = (data.income  && data.income[period])  || [];
    const bs      = (data.balanceSheet && data.balanceSheet[period]) || [];
    const cf      = (data.cashflow && data.cashflow[period]) || [];
    const earn    = data.earnings || [];

    body.innerHTML = `
      <div class="stmt-grid">
        <div id="stmt-income"></div>
        <div id="stmt-balance"></div>
      </div>
      <div class="stmt-grid">
        <div id="stmt-cashflow"></div>
        <div id="stmt-earnings"></div>
      </div>
    `;

    renderStmtTable('stmt-income', '\uD83D\uDCCA Income Statement', income, [
      { key: 'revenue',         label: 'Revenue',           fmt: 'money', growth: true },
      { key: 'grossProfit',     label: 'Gross Profit',      fmt: 'money', growth: true },
      { key: 'operatingIncome', label: 'Operating Income',  fmt: 'money', growth: true },
      { key: 'netIncome',       label: 'Net Income',        fmt: 'money', growth: true },
      { key: 'ebitda',          label: 'EBITDA',            fmt: 'money', growth: true },
      { key: 'eps',             label: 'EPS',               fmt: 'eps',   growth: true },
      { key: 'operatingMargin', label: 'Operating Margin',  fmt: 'pct' },
      { key: 'netMargin',       label: 'Net Margin',        fmt: 'pct' }
    ]);

    renderStmtTable('stmt-balance', '\uD83C\uDFE6 Balance Sheet', bs, [
      { key: 'totalAssets',     label: 'Total Assets',        fmt: 'money' },
      { key: 'totalLiabilities',label: 'Total Liabilities',   fmt: 'money' },
      { key: 'totalEquity',     label: 'Total Equity',        fmt: 'money' },
      { key: 'cash',            label: 'Cash & Equivalents',  fmt: 'money' },
      { key: 'totalDebt',       label: 'Total Debt',          fmt: 'money' },
      { key: 'netDebt',         label: 'Net Debt',            fmt: 'money' },
      { key: 'currentRatio',    label: 'Current Ratio',       fmt: 'ratio' },
      { key: 'debtToEquity',    label: 'Debt / Equity',       fmt: 'pct' }
    ]);

    renderStmtTable('stmt-cashflow', '\uD83D\uDCB5 Cash Flow', cf, [
      { key: 'operatingCashflow', label: 'Operating Cash Flow', fmt: 'money' },
      { key: 'capex',             label: 'CapEx',               fmt: 'money' },
      { key: 'freeCashflow',      label: 'Free Cash Flow',      fmt: 'money', highlight: 'gold' },
      { key: 'dividendsPaid',     label: 'Dividends Paid',      fmt: 'money' },
      { key: 'shareRepurchases',  label: 'Share Repurchases',   fmt: 'money' }

  } catch(e) {
    const b2 = document.getElementById('stmt-body');
    if (b2) b2.innerHTML = `<div class="empty-state"><div class="emoji">\u26A0\uFE0F</div><p>Data unavailable for ${ticker}</p></div>`;
  }
}

function fmtStmt(v, fmtType) {
  if (v === null || v === undefined) return '\u2014';
  if (fmtType === 'money') {
    const abs  = Math.abs(v);
    const sign = v < 0 ? '-' : '';
    if (abs >= 1e12) return sign + '$' + (abs/1e12).toFixed(1) + 'T';
    if (abs >= 1e9)  return sign + '$' + (abs/1e9).toFixed(1)  + 'B';
    if (abs >= 1e6)  return sign + '$' + (abs/1e6).toFixed(1)  + 'M';
    return sign + '$' + Math.round(abs).toLocaleString();
  }
  if (fmtType === 'eps')   return (v >= 0 ? '$' : '-$') + Math.abs(v).toFixed(2);
  if (fmtType === 'pct')   return v.toFixed(1) + '%';
  if (fmtType === 'ratio') return v.toFixed(2) + 'x';
  return String(v);
}

function renderStmtTable(containerId, title, rows, metrics) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!rows || !rows.length) {
    el.innerHTML = `<div class="stmt-section"><h3>${title}</h3><div style="color:var(--text-muted);padding:10px 0;font-size:12px">No data available</div></div>`;
    return;
  }
  const periods    = rows.map(r => r.period);
  const headerCols = periods.map(p => `<th style="text-align:right">${p}</th>`).join('');
  const tableRows  = metrics.map(metric => {
    const values = rows.map(r => r[metric.key]);
    let growthCls = '';
    if (metric.growth && values.length >= 2 && values[0] !== null && values[0] !== undefined
        && values[1] !== null && values[1] !== undefined) {
      growthCls = values[0] > values[1] ? 'pos-green' : values[0] < values[1] ? 'pos-red' : '';
    }
    const hlStyle = metric.highlight === 'gold' ? 'background:rgba(212,164,74,0.12);font-weight:700;' : '';
    const valCols = values.map(v =>
      `<td style="text-align:right;${hlStyle}" class="${growthCls}">${fmtStmt(v, metric.fmt)}</td>`
    ).join('');
    return `<tr style="${hlStyle}"><td style="color:var(--text-secondary)">${metric.label}</td>${valCols}</tr>`;
  }).join('');
  el.innerHTML = `
    <div class="stmt-section">
      <h3>${title}</h3>
      <table>
        <thead><tr>
          <th style="text-align:left">Metric</th>
          ${headerCols}
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;
}

function renderEarningsTable(containerId, earnings) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!earnings || !earnings.length) {
    el.innerHTML = `<div class="stmt-section"><h3>\uD83D\uDCC5 Earnings History</h3><div style="color:var(--text-muted);padding:10px 0;font-size:12px">No data available</div></div>`;
    return;
  }
  const rows = earnings.map(e => {
    const bgStyle   = e.beat === true  ? 'background:rgba(64,160,96,0.08)'
                    : e.beat === false ? 'background:rgba(196,64,64,0.08)' : '';
    const beatLabel = e.beat === true  ? `<span class="tag" style="background:rgba(64,160,96,0.2);color:var(--green)">Beat</span>`
                    : e.beat === false ? `<span class="tag" style="background:rgba(196,64,64,0.2);color:var(--red)">Miss</span>`
                    : '\u2014';
    const plsCls    = e.beat === true  ? 'pos-green' : e.beat === false ? 'pos-red' : '';
    const surpSign  = e.surprise !== null && e.surprise >= 0 ? '+' : '';
    const pctSign   = e.surprisePct !== null && e.surprisePct >= 0 ? '+' : '';
    return `<tr style="${bgStyle}">
      <td>${e.quarter}</td>
      <td style="text-align:right">${e.epsEstimate !== null && e.epsEstimate !== undefined ? '$' + e.epsEstimate.toFixed(2) : '\u2014'}</td>
      <td style="text-align:right">${e.epsActual !== null && e.epsActual !== undefined ? '$' + e.epsActual.toFixed(2) : '\u2014'}</td>
      <td style="text-align:right" class="${plsCls}">${e.surprise !== null && e.surprise !== undefined ? surpSign + '$' + Math.abs(e.surprise).toFixed(2) : '\u2014'}</td>
      <td style="text-align:right" class="${plsCls}">${e.surprisePct !== null && e.surprisePct !== undefined ? pctSign + e.surprisePct.toFixed(1) + '%' : '\u2014'}</td>
      <td style="text-align:center">${beatLabel}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `
    <div class="stmt-section">
      <h3>\uD83D\uDCC5 Earnings History</h3>
      <table>
        <thead><tr>
          <th style="text-align:left">Quarter</th>
          <th style="text-align:right">Est. EPS</th>
          <th style="text-align:right">Actual EPS</th>
          <th style="text-align:right">Surprise $</th>
          <th style="text-align:right">Surprise %</th>
          <th style="text-align:center">Beat/Miss</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
