<section>
  <div class="container">
    <form class="contact-form" action="mailto:Caesar192038@proton.me" method="post" enctype="text/plain">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div>
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject">
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn btn-solid">Send Message</button>
    </form>
    <p style="text-align:center; margin-top:28px; color:var(--text-dim); font-size:0.88rem;">
