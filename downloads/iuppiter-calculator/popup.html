<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iuppiter Calculator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="calc-wrapper">
    <div class="calc-header">
      <span class="calc-brand">IUPPITER</span>
      <button class="btn-angle" id="angleModeBtn" data-action="anglemode">DEG</button>
    </div>

    <div class="calc-display">
      <div class="calc-expression" id="expression"></div>
      <div class="calc-result" id="result">0</div>
    </div>

    <!-- Scientific section (6 columns) -->
    <div class="calc-sci">
      <!-- Row 1: 2nd + trig + ln/log -->
      <button class="btn btn-second" id="btnSecond" data-action="second">2nd</button>
      <button class="btn btn-sci" id="btnSin" data-action="sin">sin</button>
      <button class="btn btn-sci" id="btnCos" data-action="cos">cos</button>
      <button class="btn btn-sci" id="btnTan" data-action="tan">tan</button>
      <button class="btn btn-sci" id="btnLn"  data-action="ln">ln</button>
      <button class="btn btn-sci" id="btnLog" data-action="log">log</button>

      <!-- Row 2: parens + power ops -->
      <button class="btn btn-sci" data-action="lparen">(</button>
      <button class="btn btn-sci" data-action="rparen">)</button>
      <button class="btn btn-sci" data-action="square">x²</button>
      <button class="btn btn-sci" data-action="power">x<sup>y</sup></button>
      <button class="btn btn-sci" data-action="sqrt">√</button>
      <button class="btn btn-sci" data-action="fact">n!</button>

      <!-- Row 3: constants + memory -->
      <button class="btn btn-sci" data-action="pi">π</button>
      <button class="btn btn-sci" data-action="eul">e</button>
      <button class="btn btn-mem" data-action="memclear">MC</button>
      <button class="btn btn-mem" data-action="memrecall">MR</button>
      <button class="btn btn-mem" data-action="memadd">M+</button>
      <button class="btn btn-mem" data-action="memsub">M−</button>
    </div>

    <!-- Number pad (4 columns) — same layout as before -->
    <div class="calc-buttons">
      <!-- Row 1 -->
      <button class="btn btn-fn" data-action="clear">C</button>
      <button class="btn btn-fn" data-action="sign">+/−</button>
      <button class="btn btn-fn" data-action="percent">%</button>
      <button class="btn btn-op" data-action="operator" data-value="÷">÷</button>

      <!-- Row 2 -->
      <button class="btn btn-num" data-action="digit" data-value="7">7</button>
      <button class="btn btn-num" data-action="digit" data-value="8">8</button>
      <button class="btn btn-num" data-action="digit" data-value="9">9</button>
      <button class="btn btn-op" data-action="operator" data-value="×">×</button>

      <!-- Row 3 -->
      <button class="btn btn-num" data-action="digit" data-value="4">4</button>
      <button class="btn btn-num" data-action="digit" data-value="5">5</button>
      <button class="btn btn-num" data-action="digit" data-value="6">6</button>
      <button class="btn btn-op" data-action="operator" data-value="−">−</button>

      <!-- Row 4 -->
      <button class="btn btn-num" data-action="digit" data-value="1">1</button>
      <button class="btn btn-num" data-action="digit" data-value="2">2</button>
      <button class="btn btn-num" data-action="digit" data-value="3">3</button>
      <button class="btn btn-op" data-action="operator" data-value="+">+</button>

      <!-- Row 5 -->
      <button class="btn btn-num btn-wide" data-action="digit" data-value="0">0</button>
      <button class="btn btn-num" data-action="decimal">.</button>
      <button class="btn btn-op btn-backspace" data-action="backspace">⌫</button>
      <button class="btn btn-eq" data-action="equals">=</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
